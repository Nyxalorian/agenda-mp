spring.application.name=agenda-mp

server.port=8080

# Serialização de datas como string ISO (não como array)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.datasource.url=jdbc:sqlserver://Agenda_Pessoal_Medicamentos.mssql.somee.com:1433;databaseName=Agenda_Pessoal_Medicamentos;integratedSecurity=false;encrypt=false;trustServerCertificate=true
spring.datasource.username=loginunico123
spring.datasource.password=zeca2021
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Configurações de logging
logging.level.org.springframework.web=DEBUG
logging.level.br.itb.projeto.agenda_mp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Informações

# integratedSecurity: (true) Indica que a conexão será feita com as credenciais do Windows (false) Credencial do SQL Server
# encrypt: (true) Requer criptografia do Cliente (false) Não requer criptografia
# trustServerCertificate: (true) Instrui o aplicativo cliente a ignorar a validação do certificado SSL/TSL do servidor

# spring.jpa.hibernate.ddl-auto:
#  none: Banco de dados e tabelas devem ser criados com antecedência
#  update: Banco de dados deve ser criado com antecedência, tabelas podem ser criadas com antecedência, as tabelas serão atualizadas
#          caso o código (Entity) for alterado
# create-drop: Banco de dados deve ser criado com antecedência. Tabelas são criadas automaticamente pelo código (Entity)
#          quando o servidor é "encerrado" as tabelas serão excluídas automaticamente
# create: Banco de dados deve ser criado com antecedência. Tabelas serão recriadas toda vez que o servidor é "iniciado"
#          quando o servidor é "encerrado" as tabelas serão preservadas
